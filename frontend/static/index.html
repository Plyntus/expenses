<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Расходы</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header panel">
        <div class="header-main">
          <h1>Расходы</h1>
          <div class="summary-row" aria-live="polite">
            <p id="overallSummary" class="summary-text">Всего: -</p>
            <p id="filteredSummary" class="summary-text summary-filtered">С фильтрами: -</p>
          </div>
        </div>
        <div class="sync-panel">
          <button id="syncButton" type="button">Синхронизировать</button>
          <a id="sheetLink" class="sheet-link" href="#" target="_blank" rel="noreferrer">Открыть Google Sheets</a>
          <p id="syncMeta" class="sync-meta">Загрузка данных...</p>
        </div>
      </header>

      <section id="syncError" class="sync-error" hidden></section>

      <section class="panel filters-panel" aria-label="Фильтры расходов">
        <div class="filter-item">
          <label for="dateFrom">Период от</label>
          <input id="dateFrom" type="date" />
        </div>
        <div class="filter-item">
          <label for="dateTo">Период до</label>
          <input id="dateTo" type="date" />
        </div>
        <div class="filter-item">
          <label for="accountFilter">Счета</label>
          <select id="accountFilter" multiple></select>
        </div>
        <div class="filter-item">
          <label for="excludedCategoryFilter">Исключенные категории</label>
          <select id="excludedCategoryFilter" multiple></select>
        </div>
        <div class="filter-item">
          <label for="currencyFilter">Валюта</label>
          <select id="currencyFilter"></select>
        </div>
        <div class="filter-item">
          <label for="minCategoryTotal">Мин. сумма категории</label>
          <input id="minCategoryTotal" type="number" min="0" step="0.01" placeholder="Например, 400" />
        </div>
        <button id="resetFilters" class="secondary-button" type="button">Сбросить</button>
      </section>

      <section class="panel chart-panel">
        <div id="categoryChart" class="chart" role="img" aria-label="Расходы по категориям и субкатегориям"></div>
      </section>

      <section id="detailsSection" class="panel table-panel is-hidden">
        <h2 id="detailsTitle">Транзакции</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Счет</th>
                <th>Сумма</th>
                <th>Валюта</th>
                <th>Комментарий</th>
              </tr>
            </thead>
            <tbody id="transactionRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
