<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Расходы</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header panel">
        <div class="header-main">
          <h1 id="pageTitle">Расходы</h1>
          <div class="summary-row" aria-live="polite">
            <p id="overallSummary" class="summary-text">Всего: -</p>
            <p id="balanceSummary" class="summary-text is-hidden">Баланс: -</p>
          </div>
          <nav class="view-tabs" aria-label="Разделы продукта">
            <button id="expensesTab" class="view-tab is-active" type="button" aria-pressed="true">Расходы</button>
            <button id="balanceTab" class="view-tab" type="button" aria-pressed="false">Баланс</button>
          </nav>
        </div>
        <div class="sync-panel">
          <button id="syncButton" type="button">Синхронизировать</button>
          <p id="syncMeta" class="sync-meta">Загрузка данных...</p>
        </div>
      </header>

      <section id="syncError" class="sync-error" hidden></section>

      <section id="expenseView" class="view-page">
      <section class="panel filters-panel" aria-label="Фильтры расходов">
        <div class="filter-item">
          <label for="dateFrom">Период от</label>
          <input id="dateFrom" type="date" />
        </div>
        <div class="filter-item">
          <label for="dateTo">Период до</label>
          <input id="dateTo" type="date" />
        </div>
        <div class="filter-item">
          <label id="accountFilterLabel">Счета</label>
          <div id="accountFilter" class="multi-select" data-placeholder="Все счета"></div>
        </div>
        <div class="filter-item">
          <label id="excludedCategoryFilterLabel">Исключенные категории</label>
          <div id="excludedCategoryFilter" class="multi-select" data-placeholder="Ничего не исключать"></div>
        </div>
        <div class="filter-item">
          <label for="currencyFilter">Валюта</label>
          <select id="currencyFilter"></select>
        </div>
        <div class="filter-item">
          <label for="minCategoryTotal">Мин. сумма категории</label>
          <input id="minCategoryTotal" type="number" min="0" step="0.01" placeholder="Например, 400" />
        </div>
        <button id="resetFilters" class="secondary-button" type="button">Сбросить</button>
      </section>

      <section class="panel chart-panel">
        <div id="categoryChart" class="chart" role="img" aria-label="Расходы по категориям и субкатегориям"></div>
      </section>

      <section id="detailsSection" class="panel table-panel is-hidden">
        <h2 id="detailsTitle">Транзакции</h2>
        <div class="table-wrap">
          <table class="transaction-table">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Счет</th>
                <th>Сумма</th>
                <th>Валюта</th>
                <th>Комментарий</th>
              </tr>
            </thead>
            <tbody id="transactionRows"></tbody>
          </table>
        </div>
      </section>
      </section>

      <section id="balanceView" class="view-page is-hidden">
        <section class="panel filters-panel" aria-label="Фильтры баланса счетов">
          <div class="filter-item">
            <label for="balanceDateFrom">Период от</label>
            <input id="balanceDateFrom" type="date" />
          </div>
          <div class="filter-item">
            <label for="balanceDateTo">Период до</label>
            <input id="balanceDateTo" type="date" />
          </div>
          <div class="filter-item">
            <label id="balanceCurrencyFilterLabel">Валюта</label>
            <div id="balanceCurrencyFilter" class="multi-select" data-placeholder="Все валюты"></div>
          </div>
          <div class="filter-item">
            <label id="accountTypeFilterLabel">Тип счета</label>
            <div id="accountTypeFilter" class="multi-select" data-placeholder="Все типы"></div>
          </div>
          <div class="filter-item">
            <label id="accountStatusFilterLabel">Статус счета</label>
            <div id="accountStatusFilter" class="multi-select" data-placeholder="Все статусы"></div>
          </div>
          <label class="toggle-filter">
            <input id="convertToEur" type="checkbox" />
            <span>в EUR</span>
          </label>
          <button id="resetBalanceFilters" class="secondary-button" type="button">Сбросить</button>
        </section>

        <section class="panel balance-panel">
          <div class="balance-panel-header">
            <h2>Баланс счетов</h2>
            <p id="rateMeta" class="sync-meta">Курсы будут загружены при переключении в EUR</p>
          </div>
          <div id="balanceContent" class="balance-content"></div>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
